<section id="usecases" class="desk-services desk-section" appInView>
  <h2>Use Cases</h2>
  <div class="desk-card desk-stagger" *ngFor="let service of services">
    <h3>{{ service.icon }} {{ service.title }}</h3>
    <p>{{ service.desc }}</p>
    <button class="desk-btn" (click)="handleCTA(service)">{{ service.ctaText }}</button>
  </div>
</section>
