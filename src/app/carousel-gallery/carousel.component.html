<section class="desk-carousel desk-section" appInView>
  <div class="desk-section-header">
    <h2>See DeskPilot in Action</h2>
    <p>Explore key screens and features of our application</p>
  </div>

  <div class="desk-carousel-wrapper">
    <div 
      class="desk-carousel-track" 
      [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
    >
      <div 
        class="desk-carousel-item" 
        *ngFor="let slide of slides; let i = index"
        [class.active]="i === currentIndex"
        >
        <img [src]="slide.image" [alt]="slide.title" />
        <div class="desk-carousel-caption desk-stagger">
          <h3>{{ slide.title }}</h3>
          <p>{{ slide.desc }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="desk-carousel-controls">
    <button class="desk-carousel-btn" (click)="prev()">‹</button>
    <button class="desk-carousel-btn" (click)="next()">›</button>
  </div>

  <div class="desk-carousel-dots">
    <span 
      class="desk-dot" 
      *ngFor="let slide of slides; let i = index"
      [class.active]="i === currentIndex"
      (click)="goTo(i)"
    ></span>
  </div>
</section>
