name: Release Deploy

on:
  push:
    branches: ['release/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      build_number: ${{ steps.version.outputs.build_number }}
      full_version: ${{ steps.version.outputs.full_version }}
    steps:
      - name: Extract version from branch name or manual input
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            APP_VERSION="${{ github.event.inputs.version }}"
          else
            BRANCH="${{ github.ref_name }}"
            APP_VERSION="${BRANCH#release/}"
          fi
          BUILD_NUMBER=$(printf '%04d' ${{ github.run_number }})
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "full_version=${APP_VERSION}+${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

  pipeline:
    needs: prepare
    permissions:
      actions: read
    uses: beamo-solutions/proxmox-homelab-integration/.github/workflows/reusable-full-pipeline.yml@main
    with:
      app_name: deskhubpilot
      dockerfile: ./Dockerfile
      app_version: ${{ needs.prepare.outputs.full_version }}
    secrets: inherit
